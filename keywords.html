<!DOCTYPE html>
<html>
    <body>
        <h2>Playing and understanding JS keywords</h2>
        <!--Redeclaring a variable-->
        <p id="demo"></p>
        <p id="demo1"></p>
        <p id="demo2"></p>
        <script>
            var x = 10; //Here x value is 10
            let a = 10; //Here is x value is 10
            {
                var x = 2; //Here x value is 2
                let a = 2; //Here a value is 2
            }
            document.getElementById("demo").innerHTML= x; //Here x value is 2
            document.getElementById("demo1").innerHTML= a; //Here a value is 10

            //With let, redeclaring a variable in the same block is NOT allowed
        </script>

        <script>
            try{
                carName = "Benz";
                let carName = "Mercedes";
            }
            catch(error){
                document.getElementById("demo2").innerHTML= error; //With let keyword the initialization cannot be done later
            }
        </script>

        <h2>
            JS const keyword
        </h2>
        <P id="demo3"></P>
        <script>
            try{
                const PI = 3.1415965678;
                PI = 3.14;
            }
            catch(err){
                document.getElementById("demo3").innerHTML= err;
            }
        </script>

        <p id="demo4"></p>
        <script>
        // Create an Array:
        const cars = ["Saab", " Volvo", " BMW"];

        // Change an element:
        cars[0] = "Toyota";

        // Add an element:
        cars.push(" Audi");

        // Display the Array:
        document.getElementById("demo4").innerHTML = cars; 
        </script>

        <h2>Playing with JS const Objects</h2>
        <p id="demo5"></p>

        <script>
        // Create an object:
        const car = {type:"Fiat", model:"500", color:"white"};

        // Change a property:
        car.color = "red";

        // Add a property:
        car.owner = "Johnson";

        // Display the property:
        document.getElementById("demo5").innerHTML = "Car owner is " + car.owner;
        </script>

        <h1>JavaScript Operators</h1>
        <h2>The typeof Operator</h2>
        <p id="demo6"></p>

        <script>
        document.getElementById("demo6").innerHTML = 
        typeof "" + "<br>" +
        typeof "John" + "<br>" + 
        typeof "John Doe" + "<br>" +
        typeof 4764757784 + "<br>" +
        typeof true;
        </script>
    </body>
</html>
